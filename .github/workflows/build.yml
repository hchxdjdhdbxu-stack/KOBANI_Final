name: Build KOBANI APK
on: [push, workflow_dispatch]
permissions: write-all
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Unzip Project
        run: unzip -o '*.zip' -d project_folder
      - uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
      - name: Build
        run: |
          # العثور على المجلد الذي يحتوي على pubspec.yaml
          PROJECT_ROOT=$(find project_folder -name "pubspec.yaml" -exec dirname {} \;)
          cd "$PROJECT_ROOT"
          flutter pub get
          flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: KOBANI_App
          path: project_folder/**/build/app/outputs/flutter-apk/app-release.apk
