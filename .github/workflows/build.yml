name: Build KOBANI APK
on: [push, workflow_dispatch]
permissions: write-all

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Unzip Project
        run: unzip -o flutter2.zip
      
      - uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Clean and Build
        run: |
          cd KOBANI
          # Remove hidden trash files that cause the build to fail
          rm -rf .trashed*
          find . -name ".trashed*" -type f -delete
          # Force remove potential lock files
          rm -f pubspec.lock
          
          # Setup permissions
          chmod +x android/gradlew
          
          # Build process
          flutter clean
          flutter pub get
          flutter build apk --release --no-tree-shake-icons
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: KOBANI_APK
          path: KOBANI/build/app/outputs/flutter-apk/app-release.apk
