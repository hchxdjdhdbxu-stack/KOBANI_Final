name: Build KOBANI APK
on: [push, workflow_dispatch]
permissions: write-all
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Unzip and Explore
        run: |
          unzip -o flutter2.zip -d extracted_project
          echo "--- محتويات المجلد المكتشفة ---"
          find extracted_project -maxdepth 3
          
      - uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          
      - name: Build App
        run: |
          # العثور على المجلد الذي يحتوي على ملف pubspec.yaml
          PROJECT_DIR=$(find extracted_project -name "pubspec.yaml" -exec dirname {} \;)
          echo "تم العثور على المشروع في: $PROJECT_DIR"
          cd "$PROJECT_DIR"
          flutter pub get
          flutter build apk --release
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: KOBANI_App
          path: extracted_project/**/build/app/outputs/flutter-apk/app-release.apk
