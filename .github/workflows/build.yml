name: Build KOBANI APK
on: [push, workflow_dispatch]
permissions: write-all

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Verify file and Unzip
        run: |
          ls -F
          if [ -f "flutter2_modified.zip" ]; then
            unzip -o flutter2_modified.zip
          else
            echo "Error: flutter2_modified.zip not found!"
            exit 1
          fi
          cd $(find . -maxdepth 2 -name "pubspec.yaml" -printf "%h" | head -n 1)
          echo "PROJECT_PATH=$PWD" >> $GITHUB_ENV
      
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Build APK
        run: |
          cd $PROJECT_PATH
          rm -f pubspec.lock
          chmod +x android/gradlew
          flutter clean
          flutter pub get
          flutter build apk --release --no-tree-shake-icons
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: KOBANI_APK
          path: "**/build/app/outputs/flutter-apk/app-release.apk"
