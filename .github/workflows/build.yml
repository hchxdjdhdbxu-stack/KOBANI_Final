name: Build KOBANI APK
on: [push, workflow_dispatch]
permissions: write-all

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Unzip Project
        run: unzip -o flutter2.zip
      
      - uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Build
        run: |
          cd KOBANI
          rm -f pubspec.lock
          chmod +x android/gradlew
          flutter clean
          flutter pub get
          flutter build apk --release
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: KOBANI
          path: KOBANI/build/app/outputs/flutter-apk/app-release.apk
